name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - run: npm run test
      # Fails the job if coverage thresholds (90%) are not met; do not use || true
      - name: Check coverage thresholds (90%)
        run: npm run test:coverage
      - run: npm run lint
      - run: npm run format:check
